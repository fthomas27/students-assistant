<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Portal - Jarvis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #262626;
  --border: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text2: #d0d0d0;
  --text3: #999999;
  --accent: #FF7F50;
  --green: #5cb85c;
  --red: #ff6b6b;
  --purple: #b197fc;
  --r: 16px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.title {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  margin: 0;
}

.subtitle {
  font-size: 14px;
  color: var(--text3);
  margin-top: 4px;
}

.logout-btn {
  background: var(--red);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.2s;
}

.logout-btn:hover {
  background: #d32f2f;
}

.form-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  margin-bottom: 32px;
}

.form-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  gap: 8px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group:last-child {
  margin-bottom: 0;
}

label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255, 127, 80, 0.1);
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 600px) {
  .form-row {
    grid-template-columns: 1fr;
  }
}

.submit-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s;
  width: 100%;
}

.submit-btn:hover:not(:disabled) {
  background: #ff9066;
  transform: translateY(-2px);
}

.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.tasks-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
}

.tasks-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  gap: 8px;
}

.task-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  transition: all 0.2s;
}

.task-item:hover {
  border-color: var(--accent);
}

.task-item.completed {
  opacity: 0.6;
}

.task-header {
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 12px;
  margin-bottom: 8px;
}

.task-title {
  font-weight: 600;
  font-size: 15px;
  flex: 1;
}

.task-item.completed .task-title {
  text-decoration: line-through;
  color: var(--text3);
}

.task-urgency {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.task-urgency.high {
  background: rgba(255, 107, 107, 0.2);
  color: #ff6b6b;
}

.task-urgency.medium {
  background: rgba(255, 193, 7, 0.2);
  color: #ffc107;
}

.task-urgency.low {
  background: rgba(92, 184, 92, 0.2);
  color: #5cb85c;
}

.task-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 8px;
}

.task-due {
  display: flex;
  gap: 4px;
}

.task-notes {
  color: var(--text2);
  font-size: 13px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.task-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.task-btn {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  color: var(--text2);
}

.task-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.task-btn.complete {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

.task-btn.complete:hover {
  opacity: 0.9;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.message {
  padding: 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
}

.message.show {
  display: block;
  animation: slideInUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.message.success {
  background: rgba(92, 184, 92, 0.15);
  border: 1px solid var(--green);
  color: var(--green);
}

.message.error {
  background: rgba(255, 107, 107, 0.15);
  border: 1px solid var(--red);
  color: var(--red);
}

@keyframes slideInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1 class="title">👨‍👩‍👧 Parent Portal</h1>
      <p class="subtitle">Add and monitor tasks for your student</p>
    </div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>

  <div id="message" class="message"></div>

  <!-- Add Task Form -->
  <div class="form-section">
    <h2 class="form-title">➕ Create New Task</h2>
    <form id="addTaskForm">
      <div class="form-group">
        <label for="taskTitle">Task Title *</label>
        <input type="text" id="taskTitle" placeholder="e.g., Math homework, Science project" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="taskUrgency">Urgency</label>
          <select id="taskUrgency">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taskDueDate">Due Date (optional)</label>
          <input type="date" id="taskDueDate">
        </div>
      </div>

      <div class="form-group">
        <label for="taskNotes">Notes (optional)</label>
        <textarea id="taskNotes" placeholder="Add any notes or details about this task..."></textarea>
      </div>

      <button type="submit" class="submit-btn">Create Task</button>
    </form>
  </div>

  <!-- Tasks List -->
  <div class="tasks-section">
    <h2 class="tasks-title">📋 Tasks You've Created</h2>
    <div id="tasksList"></div>
  </div>
</div>

<script>
let tasks = [];

// Load tasks on page load
document.addEventListener('DOMContentLoaded', () => {
  loadTasks();
  document.getElementById('addTaskForm').addEventListener('submit', addTask);
});

async function loadTasks() {
  try {
    const response = await fetch('/api/parent/tasks', {
      credentials: 'same-origin'
    });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    const data = await response.json();
    tasks = data.tasks || [];
    renderTasks();
  } catch (error) {
    console.error('Error loading tasks:', error);
    showMessage('Failed to load tasks', 'error');
  }
}

function renderTasks() {
  const container = document.getElementById('tasksList');

  if (tasks.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📝</div>
        <p>No tasks created yet. Create one above to get started!</p>
      </div>
    `;
    return;
  }

  container.innerHTML = tasks.map(task => `
    <div class="task-item ${task.completed ? 'completed' : ''}">
      <div class="task-header">
        <span class="task-title">${escapeHtml(task.title)}</span>
        <span class="task-urgency ${task.urgency}">${task.urgency}</span>
      </div>
      <div class="task-meta">
        ${task.due_date ? `<div class="task-due">📅 ${formatDate(task.due_date)}</div>` : ''}
        <div>${task.completed ? '✓ Completed' : 'Pending'}</div>
      </div>
      ${task.notes ? `<div class="task-notes"><strong>Notes:</strong> ${escapeHtml(task.notes)}</div>` : ''}
      <div class="task-actions">
        ${!task.completed ? `<button class="task-btn complete" onclick="completeTask(${task.id})">✓ Mark Complete</button>` : '<button class="task-btn" disabled>Completed</button>'}
        <button class="task-btn" onclick="editTaskNotes(${task.id})">Edit Notes</button>
      </div>
    </div>
  `).join('');
}

async function addTask(e) {
  e.preventDefault();

  const title = document.getElementById('taskTitle').value.trim();
  const urgency = document.getElementById('taskUrgency').value;
  const dueDate = document.getElementById('taskDueDate').value;
  const notes = document.getElementById('taskNotes').value.trim();

  if (!title) {
    showMessage('Task title is required', 'error');
    return;
  }

  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';

  try {
    const response = await fetch('/api/parent/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        title,
        urgency,
        due_date: dueDate || null,
        notes
      })
    });

    if (response.ok) {
      showMessage(`Task "${title}" created successfully!`, 'success');
      document.getElementById('addTaskForm').reset();
      await loadTasks();
    } else {
      const error = await response.json();
      showMessage(error.error || 'Failed to create task', 'error');
    }
  } catch (error) {
    console.error('Error:', error);
    showMessage('Connection error. Please try again.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Task';
  }
}

async function completeTask(taskId) {
  try {
    const response = await fetch(`/api/parent/tasks/${taskId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ completed: true })
    });

    if (response.ok) {
      showMessage('Task marked as complete!', 'success');
      await loadTasks();
    } else {
      showMessage('Failed to complete task', 'error');
    }
  } catch (error) {
    console.error('Error:', error);
    showMessage('Connection error', 'error');
  }
}

async function editTaskNotes(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  const newNotes = prompt('Edit notes for: ' + task.title, task.notes || '');
  if (newNotes === null) return;

  try {
    const response = await fetch(`/api/parent/tasks/${taskId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ notes: newNotes })
    });

    if (response.ok) {
      showMessage('Notes updated!', 'success');
      await loadTasks();
    }
  } catch (error) {
    console.error('Error:', error);
    showMessage('Failed to update notes', 'error');
  }
}

function showMessage(text, type) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.className = `message show ${type}`;
  setTimeout(() => msg.classList.remove('show'), 3000);
}

function logout() {
  fetch('/logout', {
    method: 'POST',
    credentials: 'same-origin'
  })
    .then(() => window.location.href = '/login')
    .catch(err => console.error(err));
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
</script>

</body>
</html>
