<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Finn -- Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--bg: #0a0a0f;
--surface: #111118;
--surface2: #18181f;
--border: rgba(255,255,255,0.07);
--border2: rgba(255,255,255,0.12);
--text: #f0f0f5;
--text2: #8888a0;
--text3: #555568;
--accent: #FF7F50;
--accent2: #FF9966;
--red: #f05c5c;
--green: #4caf82;
--yellow: #ffc107;
}

body {
font-family: 'DM Sans', sans-serif;
background: var(--bg);
color: var(--text);
height: 100dvh;
display: flex;
align-items: center;
justify-content: center;
padding: 24px;
position: relative;
overflow: hidden;
}

/* subtle background texture */
body::before {
content: '';
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,247,0.06) 0%, transparent 70%),
radial-gradient(ellipse 50% 40% at 80% 80%, rgba(124,106,247,0.04) 0%, transparent 70%);
pointer-events: none;
}

.login-card {
width: 100%;
max-width: 360px;
background: var(--surface);
border: 1px solid var(--border2);
border-radius: 24px;
padding: 40px 32px 36px;
position: relative;
animation: fadeUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.logo-ring {
width: 56px; height: 56px;
border-radius: 50%;
background: linear-gradient(135deg, rgba(124,106,247,0.25), rgba(124,106,247,0.08));
border: 1px solid rgba(124,106,247,0.3);
display: flex; align-items: center; justify-content: center;
font-size: 24px;
margin: 0 auto 20px;
}

.login-title {
font-family: 'DM Serif Display', serif;
font-size: 28px;
text-align: center;
margin-bottom: 6px;
line-height: 1.1;
}

.login-sub {
font-size: 13px;
color: var(--text3);
text-align: center;
margin-bottom: 28px;
letter-spacing: 0.02em;
}

.field-label {
font-size: 11px;
font-weight: 600;
color: var(--text3);
text-transform: uppercase;
letter-spacing: 0.08em;
margin-bottom: 8px;
}

.pw-wrap {
position: relative;
margin-bottom: 20px;
}

.field-input {
width: 100%;
background: var(--surface2);
border: 1px solid var(--border2);
border-radius: 12px;
padding: 14px 46px 14px 16px;
font-size: 17px;
font-family: 'DM Sans', sans-serif;
color: var(--text);
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
letter-spacing: 0.12em;
}

.field-input:focus {
border-color: var(--accent);
box-shadow: 0 0 0 3px rgba(124,106,247,0.12);
}

.field-input.error {
border-color: var(--red);
box-shadow: 0 0 0 3px rgba(240,92,92,0.1);
animation: shake 0.35s ease;
}

@keyframes shake {
0%, 100% { transform: translateX(0); }
20% { transform: translateX(-6px); }
60% { transform: translateX(6px); }
80% { transform: translateX(-3px); }
}

.toggle-pw {
position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
background: none; border: none; color: var(--text3); cursor: pointer;
font-size: 18px; padding: 4px; -webkit-tap-highlight-color: transparent;
transition: color 0.15s;
}
.toggle-pw:active { color: var(--text2); }

.submit-btn {
width: 100%;
background: var(--accent);
color: #fff;
border: none;
border-radius: 12px;
padding: 15px;
font-size: 16px;
font-weight: 600;
font-family: 'DM Sans', sans-serif;
cursor: pointer;
transition: opacity 0.15s, transform 0.1s;
-webkit-tap-highlight-color: transparent;
position: relative;
overflow: hidden;
}
.submit-btn:active { opacity: 0.85; transform: scale(0.98); }
.submit-btn:disabled { opacity: 0.5; cursor: default; }

.error-msg {
font-size: 13px;
color: var(--red);
text-align: center;
margin-top: 14px;
height: 18px;
transition: opacity 0.2s;
}

.error-msg.lockout {
color: #ff6b6b;
font-weight: 600;
height: auto;
}

.security-info {
font-size: 11px;
color: var(--text3);
text-align: center;
margin-top: 20px;
padding: 12px;
background: var(--surface);
border-radius: 8px;
border-left: 3px solid var(--accent);
}

.security-info.warning {
border-left-color: var(--red);
background: rgba(240, 92, 92, 0.05);
}

.session-note {
font-size: 11px;
color: var(--text3);
text-align: center;
margin-top: 22px;
letter-spacing: 0.02em;
}

.system-status {
background: rgba(255, 193, 7, 0.1);
border: 1px solid rgba(255, 193, 7, 0.3);
border-left: 3px solid var(--yellow);
border-radius: 8px;
padding: 12px;
margin-bottom: 20px;
font-size: 12px;
color: var(--yellow);
text-align: center;
}
</style>

</head>
<body>

<div class="login-card">
  <div class="logo-ring">✦</div>
  <div class="login-title">Welcome back</div>
  <div class="login-sub">Your personal dashboard</div>

  <div class="system-status" id="system-status" style="display:none;"></div>

  <div class="field-label">Username</div>
  <div class="pw-wrap">
    <input
      class="field-input"
      id="username-input"
      type="text"
      placeholder="Enter username"
      autocomplete="username"
      autofocus
    >
  </div>

  <div class="field-label" id="field-label">Password</div>
  <div class="pw-wrap">
    <input
      class="field-input"
      id="pw-input"
      type="password"
      placeholder="••••••••••••"
      autocomplete="current-password"
    >
    <button class="toggle-pw" type="button" onclick="toggleVisibility()" id="toggle-btn">👁</button>
  </div>

<button class="submit-btn" id="submit-btn" onclick="submitLogin()">Unlock</button>

  <div class="error-msg" id="error-msg"></div>
  <div class="security-info" id="security-info" style="display:none;"></div>
  <div class="session-note">Secure session • 30 days</div>
</div>

<script>
var usernameInput = document.getElementById('username-input');
var input = document.getElementById('pw-input');
var btn = document.getElementById('submit-btn');
var errMsg = document.getElementById('error-msg');
var securityInfo = document.getElementById('security-info');
var fieldLabel = document.getElementById('field-label');
var systemStatus = document.getElementById('system-status');
var visible = false;
var isLocked = false;
var lockoutTimer = null;
var currentUsername = '';
var currentPassword = '';
var awaitingSecurityCode = false;

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !isLocked) submitLogin();
});

function toggleVisibility() {
  visible = !visible;
  input.type = visible ? 'text' : 'password';
  document.getElementById('toggle-btn').textContent = visible ? '🙈' : '👁';
}

function showSecurityInfo(message, isWarning) {
  securityInfo.textContent = message;
  securityInfo.className = 'security-info' + (isWarning ? ' warning' : '');
  securityInfo.style.display = 'block';
}

function startLockoutCountdown(minutesRemaining) {
  isLocked = true;
  btn.disabled = true;
  btn.textContent = minutesRemaining + 'm locked';
  input.classList.add('error');
  showSecurityInfo('🔒 Too many failed attempts. Please wait before trying again.', true);

  lockoutTimer = setInterval(function() {
    minutesRemaining--;
    if (minutesRemaining <= 0) {
      clearInterval(lockoutTimer);
      isLocked = false;
      btn.disabled = false;
      btn.textContent = 'Unlock';
      input.classList.remove('error');
      errMsg.textContent = '';
      securityInfo.style.display = 'none';
      input.focus();
    } else {
      btn.textContent = minutesRemaining + 'm locked';
    }
  }, 60000);
}

function submitLogin() {
  if (isLocked) return;

  var inputValue = input.value;
  if (!inputValue) {
    errMsg.textContent = awaitingSecurityCode ? 'Security code required' : 'Password required';
    return;
  }

  if (!awaitingSecurityCode && !usernameInput.value) {
    errMsg.textContent = 'Username required';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Checking...';
  errMsg.textContent = '';
  securityInfo.style.display = 'none';
  input.classList.remove('error');

  var payload = awaitingSecurityCode
    ? { username: currentUsername, password: currentPassword, security_code: inputValue }
    : { username: usernameInput.value, password: inputValue };

  fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    credentials: 'same-origin'
  }).then(function(r) {
    return r.json().then(function(data) {
      return { status: r.status, data: data };
    });
  }).then(function(response) {
    if (response.status === 200) {
      btn.textContent = '✓ Authenticated';
      showSecurityInfo('✓ Secure connection established', false);
      var redirect = response.data.redirect || '/';
      setTimeout(function() { window.location.href = redirect; }, 300);
    } else if (response.status === 202) {
      currentUsername = usernameInput.value;
      currentPassword = inputValue;
      awaitingSecurityCode = true;
      usernameInput.disabled = true;
      fieldLabel.textContent = 'Security Code';
      input.type = 'text';
      input.value = '';
      input.placeholder = '••••••••••••';
      input.setAttribute('autocomplete', 'off');
      btn.disabled = false;
      btn.textContent = 'Unlock';
      systemStatus.textContent = '🔒 System in Lockdown Mode';
      systemStatus.style.display = 'block';
      input.focus();
    } else if (response.status === 429) {
      awaitingSecurityCode = false;
      var minutesRemaining = response.data.minutes_remaining || 15;
      startLockoutCountdown(minutesRemaining);
      errMsg.textContent = response.data.error || 'Account locked. Too many attempts.';
    } else {
      input.value = '';
      input.classList.add('error');
      errMsg.textContent = response.data.error || (awaitingSecurityCode ? 'Invalid security code' : 'Invalid credentials');
      btn.disabled = false;
      btn.textContent = 'Unlock';
      input.focus();
      if (awaitingSecurityCode) {
        var warningMsg = '⚠ Incorrect security code. Multiple attempts may lock your account.';
      } else {
        var warningMsg = '⚠ Incorrect username or password. Multiple attempts may lock your account.';
      }
      showSecurityInfo(warningMsg, true);
    }
  }).catch(function(error) {
    console.error('Login error:', error);
    errMsg.textContent = 'Connection error. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Unlock';
  });
}

window.addEventListener('beforeunload', function() {
  if (lockoutTimer) clearInterval(lockoutTimer);
});
</script>

</body>
</html>
