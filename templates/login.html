<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jarvis Student AI -- Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--bg: #070B10;
--surface: #0D141C;
--surface2: #131C26;
--surface3: #1B2733;
--border: rgba(140,178,190,0.10);
--border2: rgba(140,178,190,0.18);
--text: #EDF5F1;
--text2: #A9BBB4;
--text3: #64766F;
--accent: #55E6A5;
--accent2: #7CF0BC;
--accent-ink: #04231A;
--red: #FF7A7A;
--green: #55E6A5;
--yellow: #FFC46B;
}

body {
font-family: 'Inter', sans-serif;
background: var(--bg);
color: var(--text);
height: 100dvh;
display: flex;
align-items: center;
justify-content: center;
padding: 24px;
position: relative;
overflow: hidden;
-webkit-font-smoothing: antialiased;
}

/* subtle animated aurora background */
body::before {
content: '';
position: fixed;
inset: -20%;
background:
radial-gradient(ellipse 50% 40% at 25% 30%, rgba(85,230,165,0.10) 0%, transparent 65%),
radial-gradient(ellipse 45% 35% at 75% 70%, rgba(111,199,242,0.07) 0%, transparent 65%),
radial-gradient(ellipse 35% 30% at 55% 50%, rgba(124,240,188,0.05) 0%, transparent 70%);
pointer-events: none;
filter: blur(20px);
animation: auroraDrift 28s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate;
will-change: transform;
}

@keyframes auroraDrift {
0%   { transform: translate3d(0, 0, 0) rotate(0deg); }
100% { transform: translate3d(2%, -1.5%, 0) rotate(4deg); }
}

@media (prefers-reduced-motion: reduce) {
body::before { animation: none; }
.login-card { animation: none; }
.field-input.error { animation: none; }
.error-msg.show { animation: none; }
.field-input:focus { transform: none; transition: border-color 0.2s, box-shadow 0.2s; }
.submit-btn:hover { transform: none; }
}

.login-card {
width: 100%;
max-width: 380px;
background: var(--surface);
border: 1px solid var(--border2);
border-radius: 26px;
padding: 42px 34px 36px;
position: relative;
box-shadow: 0 30px 80px rgba(0,0,0,0.5);
animation: fadeUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.logo-ring {
width: 58px; height: 58px;
border-radius: 50%;
background: linear-gradient(135deg, rgba(85,230,165,0.22), rgba(85,230,165,0.05));
border: 1px solid rgba(85,230,165,0.35);
box-shadow: 0 0 32px rgba(85,230,165,0.18);
display: flex; align-items: center; justify-content: center;
font-size: 24px;
color: var(--accent);
margin: 0 auto 20px;
}

.login-title {
font-family: 'Space Grotesk', sans-serif;
font-size: 27px;
font-weight: 700;
letter-spacing: -0.02em;
text-align: center;
margin-bottom: 6px;
line-height: 1.1;
}

.login-sub {
font-size: 13px;
color: var(--text3);
text-align: center;
margin-bottom: 28px;
letter-spacing: 0.02em;
}

.field-label {
font-family: 'Space Grotesk', sans-serif;
font-size: 10.5px;
font-weight: 600;
color: var(--text3);
text-transform: uppercase;
letter-spacing: 0.1em;
margin-bottom: 8px;
}

.pw-wrap {
position: relative;
margin-bottom: 20px;
}

.field-input {
width: 100%;
background: var(--surface2);
border: 1px solid var(--border2);
border-radius: 14px;
padding: 14px 46px 14px 16px;
font-size: 17px;
font-family: 'Inter', sans-serif;
color: var(--text);
outline: none;
transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
letter-spacing: 0.12em;
will-change: border-color, box-shadow;
}

.field-input:focus {
border-color: var(--accent);
box-shadow: 0 0 0 3px rgba(85,230,165,0.13), 0 0 24px rgba(85,230,165,0.07);
transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.field-input.error {
border-color: var(--red);
box-shadow: 0 0 0 3px rgba(255,122,122,0.1);
animation: shake 0.35s ease;
}

@keyframes shake {
0%, 100% { transform: translateX(0); }
20% { transform: translateX(-6px); }
60% { transform: translateX(6px); }
80% { transform: translateX(-3px); }
}

.toggle-pw {
position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
background: none; border: none; color: var(--text3); cursor: pointer;
font-size: 18px; padding: 4px; -webkit-tap-highlight-color: transparent;
transition: color 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
will-change: color, transform;
}
.toggle-pw:hover { color: var(--text2); transform: translateY(-50%) scale(1.1); }
.toggle-pw:active { color: var(--accent); transform: translateY(-50%) scale(0.9); }

.submit-btn {
width: 100%;
background: var(--accent);
color: var(--accent-ink);
border: none;
border-radius: 999px;
padding: 15px;
font-size: 15.5px;
font-weight: 600;
font-family: 'Space Grotesk', sans-serif;
letter-spacing: 0.01em;
cursor: pointer;
transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
-webkit-tap-highlight-color: transparent;
position: relative;
overflow: hidden;
box-shadow: 0 6px 26px rgba(85,230,165,0.22);
will-change: transform, opacity, box-shadow;
}
.submit-btn:hover {
  box-shadow: 0 8px 34px rgba(85,230,165,0.32);
  transform: translateY(-2px);
}
.submit-btn:active { opacity: 0.85; transform: scale(0.96) translateY(0); box-shadow: 0 2px 8px rgba(85,230,165,0.2); }
.submit-btn:disabled { opacity: 0.5; cursor: default; transform: scale(1); }

.error-msg {
font-size: 13px;
color: var(--red);
text-align: center;
margin-top: 14px;
min-height: 18px;
transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.error-msg.show {
animation: slideDownFade 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes slideDownFade {
from { opacity: 0; transform: translateY(-8px); }
to { opacity: 1; transform: translateY(0); }
}

.error-msg.lockout {
color: var(--red);
font-weight: 600;
height: auto;
}

.security-info {
font-size: 11px;
color: var(--text3);
text-align: center;
margin-top: 20px;
padding: 12px;
background: var(--surface2);
border-radius: 12px;
border: 1px solid rgba(85,230,165,0.25);
}

.security-info.warning {
border-color: rgba(255,122,122,0.35);
background: rgba(255,122,122,0.05);
}

.session-note {
font-size: 11px;
color: var(--text3);
text-align: center;
margin-top: 22px;
letter-spacing: 0.02em;
}

.system-status {
background: rgba(255,196,107,0.08);
border: 1px solid rgba(255,196,107,0.3);
border-radius: 12px;
padding: 12px;
margin-bottom: 20px;
font-size: 12px;
color: var(--yellow);
text-align: center;
}
</style>

</head>
<body>

<div class="login-card">
  <div class="logo-ring">✦</div>
  <div class="login-title">Welcome back</div>
  <div class="login-sub">Your personal dashboard</div>

  <div class="system-status" id="system-status" style="display:none;"></div>

  <div class="field-label">Username</div>
  <div class="pw-wrap">
    <input
      class="field-input"
      id="username-input"
      type="text"
      placeholder="Enter username"
      autocomplete="username"
      autofocus
    >
  </div>

  <div class="field-label" id="field-label">Password</div>
  <div class="pw-wrap">
    <input
      class="field-input"
      id="pw-input"
      type="password"
      placeholder="••••••••••••"
      autocomplete="current-password"
    >
    <button class="toggle-pw" type="button" onclick="toggleVisibility()" id="toggle-btn">👁</button>
  </div>

<button class="submit-btn" id="submit-btn" onclick="submitLogin()">Unlock</button>

  <div class="error-msg" id="error-msg"></div>
  <div class="security-info" id="security-info" style="display:none;"></div>
  <div class="session-note">Secure session • 30 days</div>
  <div class="session-note" style="margin-top:10px;">New user? <a href="/signup" style="color:var(--accent); text-decoration:none;">Sign up with access code</a></div>
</div>

<script>
var usernameInput = document.getElementById('username-input');
var input = document.getElementById('pw-input');
var btn = document.getElementById('submit-btn');
var errMsg = document.getElementById('error-msg');
var securityInfo = document.getElementById('security-info');
var fieldLabel = document.getElementById('field-label');
var systemStatus = document.getElementById('system-status');
var visible = false;
var isLocked = false;
var lockoutTimer = null;
var currentUsername = '';
var currentPassword = '';
var awaitingSecurityCode = false;

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !isLocked) submitLogin();
});

function toggleVisibility() {
  visible = !visible;
  input.type = visible ? 'text' : 'password';
  document.getElementById('toggle-btn').textContent = visible ? '🙈' : '👁';
}

function showSecurityInfo(message, isWarning) {
  securityInfo.textContent = message;
  securityInfo.className = 'security-info' + (isWarning ? ' warning' : '');
  securityInfo.style.display = 'block';
}

function startLockoutCountdown(minutesRemaining) {
  isLocked = true;
  btn.disabled = true;
  btn.textContent = minutesRemaining + 'm locked';
  input.classList.add('error');
  showSecurityInfo('🔒 Too many failed attempts. Please wait before trying again.', true);

  lockoutTimer = setInterval(function() {
    minutesRemaining--;
    if (minutesRemaining <= 0) {
      clearInterval(lockoutTimer);
      isLocked = false;
      btn.disabled = false;
      btn.textContent = 'Unlock';
      input.classList.remove('error');
      errMsg.textContent = '';
      securityInfo.style.display = 'none';
      input.focus();
    } else {
      btn.textContent = minutesRemaining + 'm locked';
    }
  }, 60000);
}

function submitLogin() {
  if (isLocked) return;

  var inputValue = input.value;
  if (!inputValue) {
    errMsg.textContent = awaitingSecurityCode ? 'Security code required' : 'Password required';
    return;
  }

  if (!awaitingSecurityCode && !usernameInput.value) {
    errMsg.textContent = 'Username required';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Checking...';
  errMsg.textContent = '';
  securityInfo.style.display = 'none';
  input.classList.remove('error');

  var payload = awaitingSecurityCode
    ? { username: currentUsername, password: currentPassword, security_code: inputValue }
    : { username: usernameInput.value, password: inputValue };

  fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    credentials: 'same-origin'
  }).then(function(r) {
    return r.json().then(function(data) {
      return { status: r.status, data: data };
    });
  }).then(function(response) {
    if (response.status === 200) {
      btn.textContent = '✓ Authenticated';
      showSecurityInfo('✓ Secure connection established', false);
      var redirect = response.data.redirect || '/';
      setTimeout(function() { window.location.href = redirect; }, 300);
    } else if (response.status === 202) {
      currentUsername = usernameInput.value;
      currentPassword = inputValue;
      awaitingSecurityCode = true;
      usernameInput.disabled = true;
      fieldLabel.textContent = 'Security Code';
      input.type = 'text';
      input.value = '';
      input.placeholder = '••••••••••••';
      input.setAttribute('autocomplete', 'off');
      btn.disabled = false;
      btn.textContent = 'Unlock';
      systemStatus.textContent = '🔒 System in Lockdown Mode';
      systemStatus.style.display = 'block';
      input.focus();
    } else if (response.status === 429) {
      awaitingSecurityCode = false;
      var minutesRemaining = response.data.minutes_remaining || 15;
      startLockoutCountdown(minutesRemaining);
      errMsg.textContent = response.data.error || 'Account locked. Too many attempts.';
    } else if (response.status === 403 && response.data.billing) {
      input.value = '';
      input.classList.add('error');
      errMsg.innerHTML = (response.data.error || 'Subscription inactive.') + ' <a href="/billing" style="color:var(--accent);">Manage billing →</a>';
      btn.disabled = false;
      btn.textContent = 'Unlock';
    } else {
      input.value = '';
      input.classList.add('error');
      errMsg.textContent = response.data.error || (awaitingSecurityCode ? 'Invalid security code' : 'Invalid credentials');
      btn.disabled = false;
      btn.textContent = 'Unlock';
      input.focus();
      if (awaitingSecurityCode) {
        var warningMsg = '⚠ Incorrect security code. Multiple attempts may lock your account.';
      } else {
        var warningMsg = '⚠ Incorrect username or password. Multiple attempts may lock your account.';
      }
      showSecurityInfo(warningMsg, true);
    }
  }).catch(function(error) {
    console.error('Login error:', error);
    errMsg.textContent = 'Connection error. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Unlock';
  });
}

window.addEventListener('beforeunload', function() {
  if (lockoutTimer) clearInterval(lockoutTimer);
});
</script>

</body>
</html>
